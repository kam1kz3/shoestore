<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SoleStore — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --text:#6b6375; --text-h:#08060d; --bg:#fff; --border:#e5e4e7;
  --accent:#000; --accent-bg:rgba(8,6,13,0.06); --accent-border:rgba(8,6,13,0.20);
  --bg2:#f4f3ec;
  --sidebar-bg:#0e0c13;
  font-family:'Roboto',sans-serif; font-size:14px; color:var(--text);
}
body{background:var(--bg);min-height:100vh;}
.layout{display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;}
.sidebar-header{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-title{font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin:0;}
.sidebar-nav{display:flex;flex-direction:column;padding:10px 8px;flex:1;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background 0.15s,color 0.15s;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.nav-item.active{background:rgba(255,255,255,0.1);color:#fff;}
.sidebar-footer{padding:14px 8px;border-top:1px solid rgba(255,255,255,0.08);}
.back-link{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.4);padding:7px 10px;border-radius:6px;background:transparent;border:none;cursor:pointer;width:100%;text-align:left;transition:color 0.15s,background 0.15s;}
.back-link:hover{color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.06);}
/* Main */
.main{flex:1;overflow-y:auto;background:var(--bg);}
.page{display:flex;flex-direction:column;gap:24px;padding:36px 40px 60px;max-width:1100px;}
.page-header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;}
.page-title{font-size:22px;font-weight:700;color:var(--text-h);margin:0;}
.page-date{font-size:13px;color:var(--text);margin:0;}
/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{border:1px solid var(--border);padding:18px 22px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.stat-card:hover{border-color:var(--accent-border);background:var(--accent-bg);}
.stat-card.accent{border-color:var(--accent-border);background:var(--accent-bg);}
.stat-value{font-size:28px;font-weight:700;color:var(--text-h);margin:0;line-height:1;}
.stat-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);margin:4px 0 0;}
.stat-sub{font-size:11px;color:var(--text);margin:0;opacity:0.7;}
/* Dashboard grid */
.dash-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
.dash-side{display:flex;flex-direction:column;gap:18px;}
/* Cards */
.card{border:1px solid var(--border);padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.card-top{display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-h);margin:0;}
.action-btn{font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);padding:4px 10px;cursor:pointer;color:var(--text-h);transition:background 0.15s,border-color 0.15s;}
.action-btn:hover{background:var(--accent-bg);border-color:var(--accent-border);}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);padding:8px 10px;border-bottom:1px solid var(--border);}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text-h);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--accent-bg);cursor:pointer;}
.mono{font-family:ui-monospace,monospace;font-size:11px;color:var(--text);}
.muted{color:var(--text);font-size:12px;}
/* Badges */
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;display:inline-block;text-transform:capitalize;white-space:nowrap;}
.badge-green{background:rgba(52,199,89,0.12);color:#1a7a35;}
.badge-blue{background:rgba(10,132,255,0.12);color:#0a5ac2;}
.badge-yellow{background:rgba(255,159,10,0.12);color:#a06300;}
.badge-red{background:rgba(255,59,48,0.12);color:#c0392b;}
/* Today / lowstock lists */
.list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;}
.list-item:last-child{border-bottom:none;}
.list-item:hover{background:var(--accent-bg);}
.li-name{font-size:13px;font-weight:500;color:var(--text-h);margin:0;}
.li-sub{font-size:12px;color:var(--text);margin:2px 0 0;}
.li-right{font-size:13px;font-weight:600;color:var(--text-h);flex-shrink:0;}
/* Admin inputs */
.admin-input{font-family:'Roboto',sans-serif;font-size:13px;color:var(--text-h);background:var(--bg);border:1px solid var(--border);padding:7px 10px;outline:none;border-radius:0;transition:border-color 0.15s;}
.admin-input:focus{border-color:var(--accent);}
/* Admin btn */
.admin-btn{font-family:'Roboto',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:7px 14px;cursor:pointer;border-radius:0;background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);transition:opacity 0.15s;}
.admin-btn:hover{opacity:0.85;}
.admin-btn-danger{background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.3);color:#c0392b;}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 18px;cursor:pointer;color:var(--text);margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;}
.tab:hover{color:var(--text-h);}
.tab.active{color:var(--text-h);border-bottom-color:var(--accent);}
/* Stock controls */
.stock-ctrl{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text-h);}
.stock-btn{width:22px;height:22px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-h);display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.stock-btn:hover{background:var(--accent-bg);}
.stock-low{color:#c0392b;font-weight:700;}
/* Calendar */
.cal-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start;}
.cal-box{border:1px solid var(--border);padding:18px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-size:15px;font-weight:700;color:var(--text-h);margin:0;}
.cal-nav{background:transparent;border:1px solid var(--border);cursor:pointer;color:var(--text-h);display:flex;align-items:center;justify-content:center;width:30px;height:30px;transition:background 0.15s;}
.cal-nav:hover{background:var(--accent-bg);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);text-align:center;padding:3px 0 7px;}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:5px 3px;background:transparent;border:1px solid transparent;cursor:pointer;border-radius:4px;gap:3px;transition:background 0.12s,border-color 0.12s;min-height:44px;}
.cal-day:hover{background:var(--accent-bg);border-color:var(--accent-border);}
.cal-day.today .day-num{background:var(--text-h);color:var(--bg);border-radius:50%;}
.cal-day.selected{background:var(--accent-bg);border-color:var(--accent-border);}
.day-num{font-size:12px;font-weight:500;color:var(--text-h);width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.day-dots{display:flex;gap:2px;}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;}
.empty-msg{font-size:13px;color:var(--text);opacity:0.7;margin:0;}
/* search */
.search-row{display:flex;gap:8px;align-items:center;}
</style>
</head>
<body>
<script type="text/babel">
const { useState, useMemo } = React;

const TODAY_STR = new Date().toISOString().slice(0,10);

const ORDERS = [
  {id:'ORD-0042',customer:'Alex Rivera',product:'Jordan Jumpman Jack TR',total:189.99,status:'delivered',date:'2026-04-20',sizeEu:'42'},
  {id:'ORD-0041',customer:'Jordan Kim',product:'Adidas BADBO 1.0',total:174.99,status:'shipped',date:'2026-04-22',sizeEu:'41'},
  {id:'ORD-0040',customer:'Sam Osei',product:'Nike Foamposite Pro',total:299.99,status:'processing',date:TODAY_STR,sizeEu:'44'},
  {id:'ORD-0039',customer:'Mia Patel',product:'Force 1 Low Lower Merion',total:199.99,status:'delivered',date:'2026-04-19',sizeEu:'38'},
  {id:'ORD-0038',customer:'Chris Yoon',product:'Nike Kobe Dunk Low',total:229.99,status:'shipped',date:TODAY_STR,sizeEu:'43'},
  {id:'ORD-0037',customer:'Dana Levi',product:'Jordan Jumpman Jack TR',total:189.99,status:'processing',date:'2026-04-18',sizeEu:'40'},
  {id:'ORD-0036',customer:'Taylor Brooks',product:'Adidas BADBO 1.0',total:174.99,status:'delivered',date:'2026-04-17',sizeEu:'42'},
  {id:'ORD-0035',customer:'Morgan Shaw',product:'Nike Foamposite Pro',total:299.99,status:'shipped',date:'2026-04-16',sizeEu:'45'},
];

const INVENTORY = [
  {id:1,name:'Jordan Jumpman Jack TR',colorway:'Green Spark',brand:'Travis Scott x AJ',price:189.99,stock:14,tag:'New Arrival'},
  {id:2,name:'Adidas BADBO 1.0',colorway:'Rise',brand:'Adidas',price:174.99,stock:2,tag:'Best Seller'},
  {id:3,name:'Nike Kobe Dunk Low',colorway:'Aces Home',brand:'Nike',price:229.99,stock:7,tag:'Limited Edition'},
  {id:4,name:'Force 1 Low Lower Merion',colorway:'Merion',brand:'Kobe x Nike',price:199.99,stock:1,tag:'Heritage'},
  {id:5,name:'Nike Foamposite Pro',colorway:'University Blue',brand:'Nike Air',price:299.99,stock:5,tag:'Sale'},
];

const STATUS_COLOR = {delivered:'badge-green',shipped:'badge-blue',processing:'badge-yellow'};

function ChevL() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>; }
function ChevR() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>; }

function Sidebar({ page, setPage }) {
  const items = [
    { id:'dashboard', label:'Dashboard', icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> },
    { id:'orders', label:'Orders', icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> },
    { id:'stock', label:'Stock', icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg> },
  ];
  return (
    <aside className="sidebar">
      <div className="sidebar-header"><p className="sidebar-title">Admin</p></div>
      <nav className="sidebar-nav">
        {items.map(i => (
          <button key={i.id} className={`nav-item${page===i.id?' active':''}`} onClick={() => setPage(i.id)}>
            {i.icon}{i.label}
          </button>
        ))}
      </nav>
      <div className="sidebar-footer">
        <button className="back-link"><ChevL /> Back to Store</button>
      </div>
    </aside>
  );
}

function Dashboard({ setPage }) {
  const todayOrders = ORDERS.filter(o => o.date === TODAY_STR);
  const lowStock = INVENTORY.filter(i => i.stock <= 3);
  const totalStock = INVENTORY.reduce((s,i) => s+i.stock, 0);
  const date = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Dashboard</h1>
        <p className="page-date">{date}</p>
      </div>
      <div className="stat-grid">
        <div className="stat-card" onClick={() => setPage('stock')}>
          <p className="stat-value">{totalStock}</p>
          <p className="stat-label">Total Stock</p>
          <p className="stat-sub">units across all products</p>
        </div>
        <div className="stat-card" onClick={() => setPage('orders')}>
          <p className="stat-value">{ORDERS.length}</p>
          <p className="stat-label">Total Orders</p>
          <p className="stat-sub">all time</p>
        </div>
        <div className="stat-card accent" onClick={() => setPage('orders')}>
          <p className="stat-value">{todayOrders.length}</p>
          <p className="stat-label">Today's Orders</p>
          <p className="stat-sub">going out today</p>
        </div>
        <div className="stat-card" onClick={() => setPage('orders')}>
          <p className="stat-value">View →</p>
          <p className="stat-label">Audit &amp; Tax</p>
          <p className="stat-sub">revenue · tax · ledger</p>
        </div>
      </div>
      <div className="dash-grid">
        <div className="card">
          <div className="card-top">
            <p className="card-title">Recent Orders</p>
            <button className="action-btn" onClick={() => setPage('orders')}>View All</button>
          </div>
          <table className="tbl">
            <thead><tr>
              <th>Order</th><th>Customer</th><th>Product</th><th>Total</th><th>Status</th>
            </tr></thead>
            <tbody>
              {[...ORDERS].reverse().slice(0,6).map(o => (
                <tr key={o.id} onClick={() => setPage('orders')}>
                  <td className="mono">{o.id}</td>
                  <td>{o.customer}</td>
                  <td className="muted">{o.product}</td>
                  <td>${o.total.toFixed(2)}</td>
                  <td><span className={`badge ${STATUS_COLOR[o.status]}`}>{o.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="dash-side">
          <div className="card">
            <div className="card-top">
              <p className="card-title">Going Out Today</p>
              <button className="action-btn" onClick={() => setPage('orders')}>View</button>
            </div>
            {todayOrders.length === 0
              ? <p className="empty-msg">No orders today.</p>
              : <div>{todayOrders.map(o => (
                  <div key={o.id} className="list-item" onClick={() => setPage('orders')}>
                    <div><p className="li-name">{o.customer}</p><p className="li-sub">{o.product} · EU {o.sizeEu}</p></div>
                    <span className="li-right">${o.total.toFixed(2)}</span>
                  </div>
                ))}</div>
            }
          </div>
          <div className="card">
            <div className="card-top">
              <p className="card-title">Low Stock Alerts</p>
              <button className="action-btn" onClick={() => setPage('stock')}>Manage</button>
            </div>
            {lowStock.length === 0
              ? <p className="empty-msg">All items are well stocked.</p>
              : <div>{lowStock.map(i => (
                  <div key={i.id} className="list-item" onClick={() => setPage('stock')}>
                    <div><p className="li-name">{i.name}</p><p className="li-sub">{i.colorway}</p></div>
                    <span className={`badge badge-red`}>{i.stock} left</span>
                  </div>
                ))}</div>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function Orders() {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [calOffset, setCalOffset] = useState(0);
  const [selDay, setSelDay] = useState(null);

  const now = new Date();
  const calDate = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
  const monthName = calDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const firstDow = calDate.getDay();
  const daysInMonth = new Date(calDate.getFullYear(), calDate.getMonth()+1, 0).getDate();

  const ordersByDate = useMemo(() => {
    const map = {};
    ORDERS.forEach(o => { if(!map[o.date]) map[o.date]=0; map[o.date]++; });
    return map;
  }, []);

  const filtered = ORDERS.filter(o => {
    const matchSearch = o.customer.toLowerCase().includes(search.toLowerCase()) || o.product.toLowerCase().includes(search.toLowerCase()) || o.id.includes(search);
    const matchFilter = filter === 'all' || o.status === filter;
    const matchDay = !selDay || o.date === selDay;
    return matchSearch && matchFilter && matchDay;
  });

  const dayStr = (d) => {
    const m = String(calDate.getMonth()+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    return `${calDate.getFullYear()}-${m}-${dd}`;
  };

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Orders</h1>
        {selDay && <button className="action-btn" onClick={() => setSelDay(null)}>Clear Day Filter</button>}
      </div>
      <div className="cal-layout">
        <div className="cal-box">
          <div className="cal-header">
            <button className="cal-nav" onClick={() => setCalOffset(o => o-1)}><ChevL /></button>
            <p className="cal-month">{monthName}</p>
            <button className="cal-nav" onClick={() => setCalOffset(o => o+1)}><ChevR /></button>
          </div>
          <div className="cal-grid">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
              <div key={d} className="cal-day-label">{d}</div>
            ))}
            {Array.from({length: firstDow}).map((_,i) => <div key={`e${i}`}/>)}
            {Array.from({length: daysInMonth}).map((_,i) => {
              const d = i+1;
              const ds = dayStr(d);
              const dots = ordersByDate[ds] || 0;
              const isToday = ds === TODAY_STR;
              const isSel = ds === selDay;
              return (
                <button key={d} className={`cal-day${isToday?' today':''}${isSel?' selected':''}`} onClick={() => setSelDay(s => s===ds ? null : ds)}>
                  <span className="day-num">{d}</span>
                  {dots > 0 && <div className="day-dots">{Array.from({length:Math.min(dots,3)}).map((_,j) => <span key={j} className="day-dot"/>)}</div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="card" style={{height:'fit-content'}}>
          <p className="card-title">{selDay ? `Orders — ${selDay}` : 'All Orders'}</p>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {['all','delivered','shipped','processing'].map(s => (
              <button key={s} className={`tab${filter===s?' active':''}`} style={{padding:'5px 10px',marginBottom:0,borderBottom:'2px solid transparent'}} onClick={() => setFilter(s)}>
                {s.charAt(0).toUpperCase()+s.slice(1)}
              </button>
            ))}
          </div>
          <input className="admin-input" placeholder="Search orders…" value={search} onChange={e => setSearch(e.target.value)} style={{width:'100%'}} />
          <div style={{maxHeight:300,overflowY:'auto'}}>
            {filtered.length === 0
              ? <p className="empty-msg">No orders match your filters.</p>
              : filtered.map(o => (
                <div key={o.id} className="list-item">
                  <div>
                    <p className="li-name">{o.customer}</p>
                    <p className="li-sub" style={{fontFamily:'ui-monospace,monospace',fontSize:11}}>{o.id} · EU {o.sizeEu}</p>
                    <p className="li-sub">{o.product}</p>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                    <span className="li-right">${o.total.toFixed(2)}</span>
                    <span className={`badge ${STATUS_COLOR[o.status]}`}>{o.status}</span>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function Stock() {
  const [stocks, setStocks] = useState(() => Object.fromEntries(INVENTORY.map(i => [i.id, i.stock])));
  const [tab, setTab] = useState('inventory');

  function adjust(id, delta) {
    setStocks(s => ({...s, [id]: Math.max(0, s[id]+delta)}));
  }

  return (
    <div className="page">
      <div className="page-header">
        <h1 className="page-title">Stock</h1>
        <button className="admin-btn">+ Add Product</button>
      </div>
      <div className="tabs">
        {['inventory','display'].map(t => (
          <button key={t} className={`tab${tab===t?' active':''}`} onClick={() => setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>
      {tab === 'inventory' && (
        <div className="card" style={{padding:0}}>
          <table className="tbl">
            <thead><tr>
              <th style={{paddingLeft:20}}>Product</th>
              <th>Colorway</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Tag</th>
              <th>Actions</th>
            </tr></thead>
            <tbody>
              {INVENTORY.map(item => {
                const s = stocks[item.id];
                return (
                  <tr key={item.id}>
                    <td style={{paddingLeft:20}}>
                      <p style={{fontWeight:500,color:'var(--text-h)',margin:0}}>{item.name}</p>
                      <p style={{fontSize:11,color:'var(--text)',margin:'2px 0 0'}}>{item.brand}</p>
                    </td>
                    <td className="muted">{item.colorway}</td>
                    <td>${item.price.toFixed(2)}</td>
                    <td>
                      <div className="stock-ctrl">
                        <button className="stock-btn" onClick={() => adjust(item.id,-1)} disabled={s===0}>−</button>
                        <span className={s<=3?'stock-low':''}>{s}</span>
                        <button className="stock-btn" onClick={() => adjust(item.id,1)}>+</button>
                      </div>
                    </td>
                    <td><span className="badge badge-blue">{item.tag}</span></td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="admin-btn" style={{padding:'3px 8px',fontSize:11}}>Edit</button>
                        <button className="admin-btn admin-btn-danger" style={{padding:'3px 8px',fontSize:11}}>Delete</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {tab === 'display' && (
        <div className="card">
          <p className="card-title">Homepage Display Order</p>
          {INVENTORY.map((item, i) => (
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:16,fontWeight:700,color:'var(--text)',width:20,textAlign:'center'}}>{i+1}</span>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:500,color:'var(--text-h)',margin:0}}>{item.name}</p>
                <p style={{fontSize:11,color:'var(--text)',margin:'2px 0 0'}}>{item.colorway}</p>
              </div>
              <div style={{display:'flex',gap:4}}>
                <button className="cal-nav">↑</button>
                <button className="cal-nav">↓</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const saved = (() => { try { return localStorage.getItem('ss_admin_page') || 'dashboard'; } catch { return 'dashboard'; } })();
  const [page, setPageRaw] = useState(saved);
  function setPage(p) { setPageRaw(p); try { localStorage.setItem('ss_admin_page', p); } catch {} }

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} />
      <main className="main">
        {page === 'dashboard' && <Dashboard setPage={setPage} />}
        {page === 'orders'    && <Orders />}
        {page === 'stock'     && <Stock />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
